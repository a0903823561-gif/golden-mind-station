<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>記憶花園</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>記憶花園 🌸</h1>
  <div id="instructions">
    <h2>玩法說明 📖</h2>
    <p>請記住花朵的位置，並在消失後點擊正確位置。</p>
    <button onclick="startGame()">開始遊戲</button>
    <button onclick="goBackMenu()">返回選單</button>
    <button onclick="goBackIntro()">返回導入頁面</button>
  </div>
  <div id="target"></div>
  <div id="game-area" style="display:none;">
    <div id="game-board"></div>
    <div id="result"></div>
  </div>
  <script src="memory.js"></script>
  <script src="common.js"></script>
</body>
</html>
