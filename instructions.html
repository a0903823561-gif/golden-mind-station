<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>遊戲說明</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>遊戲說明 📖</h1>
  <div id="instructions">
    <h2>翻翻記憶牌</h2>
    <p>翻開卡片，找出相同的圖案。全部配對完成即可通關。</p>

    <h2>專注森林</h2>
    <p>在森林裡隨機出現水果，請在時限內點擊指定的水果（例如紅色蘋果）。</p>

    <h2>反應車站</h2>
    <p>月台號誌燈會隨機亮起不同顏色，每一局會指定要點擊的顏色，請快速反應。</p>

    <h2>智慧超市</h2>
    <p>超市裡會出現商品，請找出便宜商品（價格 ≤ 30 元），點擊即可得分。</p>
  </div>

  <div id="menu">
    <button onclick="goBackMenu()">返回選單</button>
  </div>

  <script src="instructions.js"></script>
</body>
</html>
